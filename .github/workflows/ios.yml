name: iOS CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # chmod нужен ДО xcodebuild: Run Script фаза "Compile Kotlin Framework" внутри
    # archive вызывает ./gradlew, иначе "Permission denied".
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Edge-токен в Info.plist: initKoinIos читает DuqServerToken из NSBundle и кладёт в
    # AppSecrets.serverToken (аналог Android BuildConfig.SERVER_TOKEN). Без подстановки —
    # запросы без X-Auth-Token → edge-периметр 401 → fail2ban. macOS-sed требует -i ''.
    - name: Inject SERVER_TOKEN into Info.plist
      run: |
        sed -i '' "s|__SERVER_TOKEN__|${{ secrets.SERVER_TOKEN }}|g" iosApp/iosApp/Info.plist
        grep -q "__SERVER_TOKEN__" iosApp/iosApp/Info.plist && { echo "::error::токен не подставлен"; exit 1; } || echo "SERVER_TOKEN injected"

    # Сборка unsigned .ipa. Официальная схема KMP Direct integration: Run Script
    # фаза "Compile Kotlin Framework" из project.pbxproj вызывает
    # `:shared:embedAndSignAppleFrameworkForXcode` ВНУТРИ archive под нужные
    # CONFIGURATION/SDK_NAME/ARCHS и кладёт Shared.framework в
    # shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME). Xcode линкует его
    # через FRAMEWORK_SEARCH_PATHS + OTHER_LDFLAGS (-framework Shared).
    # ENABLE_USER_SCRIPT_SANDBOXING=NO (в pbxproj) даёт фазе доступ к BUILT_PRODUCTS_DIR.
    - name: Archive iosApp (unsigned)
      run: |
        xcodebuild \
          -project iosApp/iosApp.xcodeproj \
          -scheme iosApp \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          -archivePath "$PWD/build/iosApp.xcarchive" \
          archive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGN_ENTITLEMENTS="" \
          DEVELOPMENT_TEAM=""

    # Упаковка unsigned .ipa: Payload/iosApp.app → zip. SideStore/AltStore подпишет на телефоне.
    - name: Package unsigned .ipa
      run: |
        APP_PATH="build/iosApp.xcarchive/Products/Applications/iosApp.app"
        if [ ! -d "$APP_PATH" ]; then
          echo "::error::Не найден $APP_PATH — archive не собрал .app"
          ls -R build/iosApp.xcarchive/Products || true
          exit 1
        fi
        rm -rf Payload iosApp.ipa
        mkdir -p Payload
        cp -R "$APP_PATH" Payload/
        zip -r iosApp.ipa Payload >/dev/null
        echo "Собран unsigned .ipa:"
        ls -lh iosApp.ipa

    - name: Upload iOS .ipa artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: iosApp-unsigned-ipa
        path: iosApp.ipa
        retention-days: 7
        if-no-files-found: warn
