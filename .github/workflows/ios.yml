name: iOS CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Статический Shared.framework собираем ОТДЕЛЬНЫМ gradle-шагом ДО xcodebuild.
    # `embedAndSignAppleFrameworkForXcode` в Run Script фазе скипался (нет нужного
    # Xcode-окружения / он завязан на встраивание .framework) → Shared не линковался
    # → undefined symbols (включая авто-линкуемый UIUtilities из Compose UIKit-интеропа).
    # linkReleaseFrameworkIosArm64 кладёт собранный статический фреймворк в
    # shared/build/bin/iosArm64/releaseFramework/Shared.framework — туда смотрит
    # FRAMEWORK_SEARCH_PATHS из project.pbxproj.
    - name: Build shared iOS framework (static, iosArm64/Release)
      run: ./gradlew :shared:linkReleaseFrameworkIosArm64 --no-daemon

    # Сборка unsigned .ipa. Xcode линкует уже готовый статический Shared.framework
    # через FRAMEWORK_SEARCH_PATHS + OTHER_LDFLAGS (-framework Shared). Run Script
    # "Compile Kotlin Framework" из pbxproj удалён — фреймворк готовится gradle выше.
    - name: Archive iosApp (unsigned)
      run: |
        xcodebuild \
          -project iosApp/iosApp.xcodeproj \
          -scheme iosApp \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          -archivePath "$PWD/build/iosApp.xcarchive" \
          archive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGN_ENTITLEMENTS="" \
          DEVELOPMENT_TEAM=""

    # Упаковка unsigned .ipa: Payload/iosApp.app → zip. SideStore/AltStore подпишет на телефоне.
    - name: Package unsigned .ipa
      run: |
        APP_PATH="build/iosApp.xcarchive/Products/Applications/iosApp.app"
        if [ ! -d "$APP_PATH" ]; then
          echo "::error::Не найден $APP_PATH — archive не собрал .app"
          ls -R build/iosApp.xcarchive/Products || true
          exit 1
        fi
        rm -rf Payload iosApp.ipa
        mkdir -p Payload
        cp -R "$APP_PATH" Payload/
        zip -r iosApp.ipa Payload >/dev/null
        echo "Собран unsigned .ipa:"
        ls -lh iosApp.ipa

    - name: Upload iOS .ipa artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: iosApp-unsigned-ipa
        path: iosApp.ipa
        retention-days: 7
        if-no-files-found: warn
