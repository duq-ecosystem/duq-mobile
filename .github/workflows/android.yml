name: Android CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive   # whisper.cpp (on-device STT) — нужен на фазе audio

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # NDK запиннен (shared/build.gradle.kts ndkVersion=26.3.11579264). Ставим РОВНО его
    # через sdkmanager — предустановленный в раннере NDK бывает битый (CXX1101: нет
    # source.properties), из-за чего сборка :shared (whisper.cpp CMake) падала.
    - name: Install pinned NDK (r26d)
      run: |
        yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;26.3.11579264" >/dev/null 2>&1 || \
        yes | sdkmanager "ndk;26.3.11579264" >/dev/null 2>&1 || true
        ls -d "$ANDROID_SDK_ROOT/ndk/26.3.11579264" && echo "NDK r26d ready"

    # detekt (статический анализ Kotlin). БЕЗ baseline-сокрытия: показывает РЕАЛЬНОЕ
    # число findings. Легаси-долг на 2026-07-09: ~1047 (shared 1028, androidApp 19) —
    # НЕ прячем, чиним по TODO (роадмап). Пока чистится — continue-on-error, чтобы APK
    # собирался, но число findings ЯВНО в логе (не фейковый зелёный).
    - name: Detekt (Kotlin SAST/lint) — реальное число findings, без baseline
      run: |
        set +e
        ./gradlew detekt --no-daemon
        code=$?
        echo "----- detekt weighted issues (реальный легаси-долг, не скрыт) -----"
        grep -rhE "weighted issues|number of total code smells" **/build/reports/detekt/*.md 2>/dev/null || true
        if [ $code -ne 0 ]; then echo "::warning::detekt нашёл findings — легаси-долг Kotlin, чинить (см. роадмап)"; fi
      continue-on-error: true

    - name: Upload detekt reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: detekt-reports
        path: '**/build/reports/detekt/*'
        if-no-files-found: ignore

    # versionCode непрерывен с монорепо (последний был 319): сдвиг +400 → первый билд > 319,
    # иначе AppUpdater сочтёт обновление даунгрейдом.
    - name: Compute versionCode (continuous with monorepo 319)
      run: echo "DUQ_VERSION_CODE=$((GITHUB_RUN_NUMBER + 400))" >> "$GITHUB_ENV"

    # Декодируем keystore из секрета (если задан). Без KEYSTORE_PASSWORD/KEY_ALIAS
    # build.gradle падает на release-config → fallback на debug-подпись (APK рабочий;
    # та же подпись keystore включится, когда Денис добавит пароли в секреты).
    - name: Decode keystore (if present)
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      run: |
        if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > androidApp/duq-release.jks
        fi

    - name: Build release APK
      run: ./gradlew :androidApp:assembleRelease --no-daemon --build-cache
      env:
        KEYSTORE_FILE: duq-release.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        GH_RELEASE_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        SERVER_TOKEN: ${{ secrets.SERVER_TOKEN }}

    # version.json — манифест обновления, который опрашивает AppUpdater (versionCode == APK).
    # APK переименовываем в app-release.apk — именно это имя ассета ищет AppUpdater
    # (AndroidAppUpdateController.APK_ASSET_NAME). Иначе автообновление видит версию, но
    # не находит файл («app-release.apk не найден в релизе»).
    - name: Generate update manifest + rename APK for AppUpdater
      if: github.event_name == 'push'
      run: |
        printf '{"versionCode": %s, "versionName": "1.0.%s"}\n' "$DUQ_VERSION_CODE" "$DUQ_VERSION_CODE" > version.json
        cat version.json
        cp androidApp/build/outputs/apk/release/androidApp-release.apk \
           androidApp/build/outputs/apk/release/app-release.apk

    - name: Create GitHub Release with APK
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ env.DUQ_VERSION_CODE }}
        name: "Build #${{ env.DUQ_VERSION_CODE }}"
        body: ${{ github.event.head_commit.message }}
        files: |
          androidApp/build/outputs/apk/release/app-release.apk
          version.json
        prerelease: false
        make_latest: true

    - name: Upload APK artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: androidApp-release
        path: androidApp/build/outputs/apk/release/androidApp-release.apk
        retention-days: 7
