name: Android CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive   # whisper.cpp (on-device STT) — нужен на фазе audio

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Quality-gate: detekt (статический анализ Kotlin, SAST/lint) ПЕРЕД сборкой.
    # Нет baseline (первый прогон) → генерим его (фиксируем легаси-долг) и не валим
    # сборку; SARIF-отчёт грузится в артефакты/Security-таб. Когда baseline
    # закоммичен — detekt валит CI на ЛЮБОЙ новой проблеме (ratchet).
    - name: Detekt (Kotlin SAST/lint)
      run: |
        if [ ! -f config/detekt/baseline.xml ]; then
          echo "::notice::detekt baseline отсутствует — генерирую (легаси-долг фиксируется)"
          ./gradlew detektBaseline --no-daemon || true
          echo "::warning::Закоммить config/detekt/baseline.xml — тогда detekt станет блокирующим gate"
        fi
        ./gradlew detekt --no-daemon
      continue-on-error: true

    - name: Upload detekt reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: detekt-reports
        path: '**/build/reports/detekt/*'
        if-no-files-found: ignore

    # versionCode непрерывен с монорепо (последний был 319): сдвиг +400 → первый билд > 319,
    # иначе AppUpdater сочтёт обновление даунгрейдом.
    - name: Compute versionCode (continuous with monorepo 319)
      run: echo "DUQ_VERSION_CODE=$((GITHUB_RUN_NUMBER + 400))" >> "$GITHUB_ENV"

    # Декодируем keystore из секрета (если задан). Без KEYSTORE_PASSWORD/KEY_ALIAS
    # build.gradle падает на release-config → fallback на debug-подпись (APK рабочий;
    # та же подпись keystore включится, когда Денис добавит пароли в секреты).
    - name: Decode keystore (if present)
      if: github.event_name == 'push'
      run: |
        if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > androidApp/duq-release.jks
        fi

    - name: Build release APK
      run: ./gradlew :androidApp:assembleRelease --no-daemon --build-cache
      env:
        KEYSTORE_FILE: duq-release.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        GH_RELEASE_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        SERVER_TOKEN: ${{ secrets.SERVER_TOKEN }}

    # version.json — манифест обновления, который опрашивает AppUpdater (versionCode == APK).
    # APK переименовываем в app-release.apk — именно это имя ассета ищет AppUpdater
    # (AndroidAppUpdateController.APK_ASSET_NAME). Иначе автообновление видит версию, но
    # не находит файл («app-release.apk не найден в релизе»).
    - name: Generate update manifest + rename APK for AppUpdater
      if: github.event_name == 'push'
      run: |
        printf '{"versionCode": %s, "versionName": "1.0.%s"}\n' "$DUQ_VERSION_CODE" "$DUQ_VERSION_CODE" > version.json
        cat version.json
        cp androidApp/build/outputs/apk/release/androidApp-release.apk \
           androidApp/build/outputs/apk/release/app-release.apk

    - name: Create GitHub Release with APK
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ env.DUQ_VERSION_CODE }}
        name: "Build #${{ env.DUQ_VERSION_CODE }}"
        body: ${{ github.event.head_commit.message }}
        files: |
          androidApp/build/outputs/apk/release/app-release.apk
          version.json
        prerelease: false
        make_latest: true

    - name: Upload APK artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: androidApp-release
        path: androidApp/build/outputs/apk/release/androidApp-release.apk
        retention-days: 7
