# Detekt-конфиг DUQ mobile (KMP). buildUponDefaultConfig=true → это ПЕРЕОПРЕДЕЛЕНИЯ
# поверх дефолтов detekt. Прагматичный порог: ловим реальные проблемы (сложность,
# потенциальные баги, стиль корутин/Compose), не топим в шуме. Ratchet — baseline.xml
# фиксирует легаси, gate падает на НОВЫХ проблемах.

build:
  maxIssues: 0            # с baseline: НОВЫХ проблем быть не должно
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

complexity:
  active: true
  LongMethod:
    threshold: 120       # KMP/Compose-функции бывают длинные; не душить
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
  CyclomaticComplexMethod:
    threshold: 20
  TooManyFunctions:
    active: false        # сервисы/клиенты законно крупные

naming:
  active: true
  FunctionNaming:
    # @Composable-функции по конвенции Compose именуются PascalCase (MessageBubble, MainScreen) —
    # это НЕ нарушение, а стандарт. Дефолт detekt (camelCase) ложно флажит все Composable.
    ignoreAnnotated: ['Composable']
  MatchingDeclarationName:
    # UI-код осознанно группирует связанные декларации под ТЕМАТИЧЕСКИМ именем файла
    # (Theme.kt→DuqColors, HubScreen.kt→HubSection, CommandPalette.kt→PaletteCommand) —
    # переименование файла в имя единственной декларации потеряло бы семантику. Отключаем.
    active: false

empty-blocks:
  EmptyFunctionBlock:
    # iosMain — заглушки iOS-реализаций (аудио/VAD/TTS ещё не портированы на iOS): пустое тело
    # осознанно. Android-заглушки no-op override'ов помечены @Suppress точечно.
    excludes: ['**/iosMain/**']

style:
  active: true
  MaxLineLength:
    maxLineLength: 140
  ReturnCount:
    max: 6
  MagicNumber:
    active: false        # слишком шумно для UI-кода (dp/размеры)
  UnusedPrivateMember:
    active: true         # реальный мусор — ловим
  WildcardImport:
    # Compose-конвенция (см. .editorconfig): androidx.compose.* wildcard'ы идиоматичны.
    excludeImports:
      - 'java.util.*'
      - 'androidx.compose.runtime.*'
      - 'androidx.compose.foundation.layout.*'
      - 'androidx.compose.material3.*'
      - 'androidx.compose.animation.core.*'

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: false        # best-effort catch(Exception) в сетевом/IO-коде осознан
  SwallowedException:
    active: false        # то же — глушение в fire-and-forget осознано

potential-bugs:
  active: true           # категория реальных багов — держим включённой

coroutines:
  active: true           # корутины: GlobalScope, suspend-in-runBlocking и т.п.

formatting:
  active: true
  MaximumLineLength:
    maxLineLength: 140
  FinalNewline:
    active: true
  Filename:
    # iosMain actual-файлы по конвенции KMP названы как expect (AudioRecorder.kt содержит
    # IosAudioRecorder) — имя файла = имя контракта, не реализации. Осознанно.
    excludes: ['**/iosMain/**']
  NoWildcardImports:
    # Дублирует style/WildcardImport (там заданы compose-исключения). Отключаем ktlint-дубль,
    # чтобы не держать список compose-пакетов в двух местах; не-compose wildcard'ы ловит WildcardImport.
    active: false
